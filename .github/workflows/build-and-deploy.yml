name: Build and deploy site
run-name: Build and deploy site

on:
  workflow_call:
    inputs:
      mode:
        required: true
        type: string
      send_telegram:
        default: false
        required: false
        type: boolean
    secrets:
      MOLIT_API_KEY:
        required: true
      APT_INFO_API_KEY:
        required: false
      TELEGRAM_ENABLED:
        required: false
      TELEGRAM_BOT_TOKEN:
        required: false
      TELEGRAM_CHAT_ID:
        required: false
      VERCEL_TOKEN:
        required: false
      VERCEL_ORG_ID:
        required: false
      VERCEL_PROJECT_ID:
        required: false

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Korean fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk

      - name: Install Python packages
        run: pip install -r requirements.txt

      - name: Restore SQLite cache
        uses: actions/cache@v4
        with:
          path: data/trades.sqlite3
          key: trades-sqlite-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            trades-sqlite-${{ runner.os }}-

      - name: Restore seed SQLite when cache is empty
        run: |
          python - <<'PY'
          from pathlib import Path
          import zipfile

          db_path = Path("data/trades.sqlite3")
          seed_path = Path("trades-seed.zip")

          if db_path.exists() and db_path.stat().st_size > 0:
              print("SQLite DB restored from cache.")
          elif seed_path.exists():
              print("Restoring SQLite DB from trades-seed.zip.")
              db_path.parent.mkdir(exist_ok=True)
              with zipfile.ZipFile(seed_path) as archive:
                  with archive.open("trades.sqlite3") as source:
                      db_path.write_bytes(source.read())
          elif "${{ inputs.mode }}" == "daily":
              print("No SQLite cache or seed file found. Initial backfill will run.")
          else:
              raise SystemExit("No SQLite cache or seed file found.")
          PY

      - name: Initial 8-year collection when DB is empty
        if: inputs.mode == 'daily'
        env:
          MOLIT_API_KEY: ${{ secrets.MOLIT_API_KEY }}
        run: |
          python - <<'PY'
          from database import init_db, get_summary
          init_db()
          summary = get_summary()
          if summary["total_trades"]:
              print("DB already has data. Skipping initial backfill.")
          else:
              import subprocess
              subprocess.check_call(["python", "collector.py", "--mode", "backfill", "--sleep", "0.1"])
          PY

      - name: Collect apartment complex list when empty
        if: inputs.mode == 'daily'
        env:
          MOLIT_API_KEY: ${{ secrets.MOLIT_API_KEY }}
          APT_INFO_API_KEY: ${{ secrets.APT_INFO_API_KEY }}
        run: |
          python - <<'PY'
          import subprocess
          from database import get_connection, init_db
          init_db()
          conn = get_connection()
          count = conn.execute("SELECT COUNT(*) FROM apartment_complexes").fetchone()[0]
          if count:
              print(f"Complex table already has {count} rows. Skipping.")
          else:
              try:
                  subprocess.check_call(["python", "complex_collector.py", "--list-only", "--sleep", "0.05"])
              except subprocess.CalledProcessError as error:
                  print(f"Warning: complex list collection failed: {error}. Continuing daily report.")
          PY

      - name: Refresh current and previous month
        if: inputs.mode == 'daily'
        env:
          MOLIT_API_KEY: ${{ secrets.MOLIT_API_KEY }}
          TELEGRAM_ENABLED: ${{ inputs.send_telegram && secrets.TELEGRAM_ENABLED || 'false' }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python daily_update.py --sleep 0.1

      - name: Refresh apartment complex household counts
        if: inputs.mode == 'monthly'
        env:
          APT_INFO_API_KEY: ${{ secrets.APT_INFO_API_KEY }}
          MOLIT_API_KEY: ${{ secrets.MOLIT_API_KEY }}
        run: python complex_collector.py --force --sleep 0.2

      - name: Compact SQLite database
        if: inputs.mode == 'monthly'
        run: python compact_database.py --skip-backup

      - name: Rebuild static site
        if: inputs.mode == 'monthly' || inputs.mode == 'site'
        env:
          MOLIT_API_KEY: ${{ secrets.MOLIT_API_KEY }}
        run: python build_static_site.py

      - name: Send Telegram report
        if: inputs.send_telegram && inputs.mode != 'daily'
        env:
          MOLIT_API_KEY: ${{ secrets.MOLIT_API_KEY }}
          TELEGRAM_ENABLED: ${{ secrets.TELEGRAM_ENABLED || 'true' }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python telegram_sender.py

      - name: Package SQLite database snapshot
        run: |
          if [ -f data/trades.sqlite3 ]; then
            zip -j trades-sqlite-snapshot.zip data/trades.sqlite3
          else
            echo "No SQLite database found to package."
          fi

      - name: Upload SQLite database snapshot
        if: hashFiles('trades-sqlite-snapshot.zip') != ''
        uses: actions/upload-artifact@v4
        with:
          name: trades-sqlite-snapshot
          path: trades-sqlite-snapshot.zip
          retention-days: 7

      - name: Deploy generated public directory to Vercel
        if: env.VERCEL_TOKEN != '' && env.VERCEL_ORG_ID != '' && env.VERCEL_PROJECT_ID != ''
        run: |
          rm -rf .vercel
          mkdir -p .vercel/output/static
          printf '{"orgId":"%s","projectId":"%s"}' "$VERCEL_ORG_ID" "$VERCEL_PROJECT_ID" > .vercel/project.json
          printf '{"version":3}' > .vercel/output/config.json
          cp -R public/. .vercel/output/static/
          npx vercel@latest deploy --prebuilt --prod --yes --token "$VERCEL_TOKEN"

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
