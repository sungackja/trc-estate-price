name: Daily record-high report

on:
  workflow_dispatch:
  schedule:
    # 06:00 KST is 21:00 UTC on the previous day.
    - cron: "0 21 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  daily:
    uses: ./.github/workflows/build-and-deploy.yml
    with:
      mode: daily
      send_telegram: true
    secrets: inherit
