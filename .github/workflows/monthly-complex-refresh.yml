name: Monthly apartment complex refresh

on:
  workflow_dispatch:
  schedule:
    # 03:30 KST on the second day of each month.
    - cron: "30 18 1 * *"

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  monthly:
    uses: ./.github/workflows/build-and-deploy.yml
    with:
      mode: monthly
      send_telegram: false
    secrets: inherit
