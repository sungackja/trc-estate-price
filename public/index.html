<!doctype html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>오늘 새로 포착된 서울 아파트 거래</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background: #f3f4f6;
            color: #111827;
            font-family: Arial, "Malgun Gothic", sans-serif;
        }

        header {
            background: #ffffff;
            border-bottom: 1px solid #e5e7eb;
            padding: 28px 24px 18px;
        }

        .header-inner,
        main {
            margin: 0 auto;
            max-width: 1120px;
        }

        .eyebrow {
            color: #b40000;
            font-size: 13px;
            font-weight: 700;
            margin: 0 0 8px;
        }

        .title-row {
            align-items: start;
            display: flex;
            gap: 18px;
            justify-content: space-between;
        }

        h1 {
            font-size: 32px;
            line-height: 1.25;
            margin: 0;
        }

        .view-buttons {
            background: #f8fafc;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            display: inline-flex;
            flex: 0 0 auto;
            overflow: hidden;
            padding: 3px;
        }

        .view-button {
            background: transparent;
            border: 0;
            border-radius: 6px;
            color: #475467;
            cursor: pointer;
            font: inherit;
            font-size: 14px;
            font-weight: 700;
            height: 36px;
            padding: 0 14px;
        }

        .view-button.active {
            background: #b40000;
            color: #ffffff;
        }

        .submeta {
            color: #4b5563;
            display: flex;
            flex-wrap: wrap;
            gap: 10px 18px;
            margin-top: 12px;
        }

        main {
            padding: 22px 24px 40px;
        }

        .tab-panel[hidden] {
            display: none;
        }

        .report-image {
            background: #ffffff;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            margin-bottom: 28px;
            overflow: hidden;
        }

        .report-image img {
            display: block;
            height: auto;
            width: 100%;
        }

        .section-title {
            align-items: baseline;
            display: flex;
            justify-content: space-between;
            margin: 0 0 12px;
        }

        h2 {
            font-size: 20px;
            margin: 0;
        }

        .count {
            color: #6b7280;
            font-size: 14px;
        }

        .filters {
            align-items: end;
            background: #ffffff;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            display: grid;
            gap: 12px;
            grid-template-columns: 1.3fr repeat(4, 1fr);
            padding: 14px;
        }

        label {
            color: #4b5563;
            display: grid;
            font-size: 13px;
            gap: 6px;
        }

        select,
        input {
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font: inherit;
            height: 38px;
            padding: 0 10px;
            width: 100%;
        }

        .table-wrap {
            background: #ffffff;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            margin-top: 14px;
            overflow: auto;
        }

        table {
            border-collapse: collapse;
            min-width: 960px;
            width: 100%;
        }

        th,
        td {
            border-bottom: 1px solid #edf0f3;
            font-size: 14px;
            padding: 12px;
            text-align: left;
            white-space: nowrap;
        }

        th {
            background: #f8fafc;
            color: #475467;
            font-size: 12px;
        }

        .apt,
        .price,
        .up {
            font-weight: 700;
        }

        .up {
            color: #d00000;
        }

        .empty {
            color: #6b7280;
            padding: 30px;
            text-align: center;
        }

        @media (max-width: 860px) {
            .title-row {
                display: grid;
            }

            h1 {
                font-size: 25px;
            }

            .filters {
                grid-template-columns: 1fr 1fr;
            }
        }

        @media (max-width: 560px) {
            .filters {
                grid-template-columns: 1fr;
            }

            .view-buttons {
                width: 100%;
            }

            .view-button {
                flex: 1;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-inner">
            <p class="eyebrow">공개/포착일 기준</p>
            <div class="title-row">
                <h1>오늘 새로 포착된 서울 아파트 거래</h1>
                <nav class="view-buttons" aria-label="목록 전환">
                    <button class="view-button active" type="button" data-view="records">신고가 목록</button>
                    <button class="view-button" type="button" data-view="latest">실거래가 목록</button>
                </nav>
            </div>
            <div class="submeta">
                <span>리포트 기준일: 2026-04-24</span>
                <span>최근 업데이트 시간: 2026-04-25 19:29 KST</span>
                <span>DB 범위: 2018-04-01 ~ 2026-04-23</span>
                <span>누적 거래: 448,066건</span>
                <span>단지정보: 3/3,362건 (0.1%)</span>
            </div>
        </div>
    </header>

    <main>
        <section class="tab-panel" id="recordsPanel">
            <section class="report-image" aria-label="이미지형 리포트">
                <img src="today-record-highs.svg" alt="전체 신고가 리스트 이미지형 리포트">
            </section>

            <div class="section-title">
                <h2>전체 신고가 리스트</h2>
                <span class="count" id="recordCount">0건</span>
            </div>
            <div class="filters" id="recordFilters">
                <label>구<select id="recordGu"><option value="">전체</option></select></label>
                <label>최소 면적<input id="recordMinArea" type="number" min="0" step="1" placeholder="m2"></label>
                <label>최대 면적<input id="recordMaxArea" type="number" min="0" step="1" placeholder="m2"></label>
                <label>최소 가격<input id="recordMinPrice" type="number" min="0" step="0.1" placeholder="억"></label>
                <label>최대 가격<input id="recordMaxPrice" type="number" min="0" step="0.1" placeholder="억"></label>
            </div>
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>공개일</th>
                            <th>계약일</th>
                            <th>구</th>
                            <th>동</th>
                            <th>단지명</th>
                            <th>전용</th>
                            <th>세대수</th>
                            <th>전고가</th>
                            <th>거래금액</th>
                            <th>증감</th>
                        </tr>
                    </thead>
                    <tbody id="recordRows"></tbody>
                </table>
                <div class="empty" id="recordEmpty">조건에 맞는 신고가가 없습니다.</div>
            </div>
        </section>

        <section class="tab-panel" id="latestPanel" hidden>
            <div class="section-title">
                <h2>오늘 업데이트된 실거래가 리스트</h2>
                <span class="count" id="latestCount">0건</span>
            </div>
            <div class="filters" id="latestFilters">
                <label>구<select id="latestGu"><option value="">전체</option></select></label>
                <label>최소 면적<input id="latestMinArea" type="number" min="0" step="1" placeholder="m2"></label>
                <label>최대 면적<input id="latestMaxArea" type="number" min="0" step="1" placeholder="m2"></label>
                <label>최소 가격<input id="latestMinPrice" type="number" min="0" step="0.1" placeholder="억"></label>
                <label>최대 가격<input id="latestMaxPrice" type="number" min="0" step="0.1" placeholder="억"></label>
            </div>
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>공개일</th>
                            <th>계약일</th>
                            <th>구</th>
                            <th>동</th>
                            <th>단지명</th>
                            <th>전용</th>
                            <th>층</th>
                            <th>세대수</th>
                            <th>거래금액</th>
                        </tr>
                    </thead>
                    <tbody id="latestRows"></tbody>
                </table>
                <div class="empty" id="latestEmpty">조건에 맞는 실거래가가 없습니다.</div>
            </div>
        </section>
    </main>

    <script>
        const recordRows = [];
        const latestRows = [];

        function money(value) {
            return Number(value).toLocaleString("ko-KR");
        }

        function price(value) {
            return Number(value).toLocaleString("ko-KR", { maximumFractionDigits: 3 });
        }

        function setupTable(config) {
            const guFilter = document.getElementById(config.gu);
            const minArea = document.getElementById(config.minArea);
            const maxArea = document.getElementById(config.maxArea);
            const minPrice = document.getElementById(config.minPrice);
            const maxPrice = document.getElementById(config.maxPrice);
            const body = document.getElementById(config.body);
            const empty = document.getElementById(config.empty);
            const count = document.getElementById(config.count);

            [...new Set(config.rows.map((row) => row.gu))].sort().forEach((gu) => {
                const option = document.createElement("option");
                option.value = gu;
                option.textContent = gu;
                guFilter.appendChild(option);
            });

            function passes(row) {
                const gu = guFilter.value;
                const minA = Number(minArea.value || 0);
                const maxA = Number(maxArea.value || Infinity);
                const minP = Number(minPrice.value || 0);
                const maxP = Number(maxPrice.value || Infinity);
                return (!gu || row.gu === gu)
                    && row.area >= minA
                    && row.area <= maxA
                    && row.priceEok >= minP
                    && row.priceEok <= maxP;
            }

            function render() {
                const filtered = config.rows.filter(passes);
                body.innerHTML = filtered.map(config.renderRow).join("");
                empty.style.display = filtered.length ? "none" : "block";
                count.textContent = `${filtered.length.toLocaleString("ko-KR")}건`;
            }

            [guFilter, minArea, maxArea, minPrice, maxPrice].forEach((element) => {
                element.addEventListener("input", render);
            });

            render();
            return render;
        }

        setupTable({
            rows: recordRows,
            gu: "recordGu",
            minArea: "recordMinArea",
            maxArea: "recordMaxArea",
            minPrice: "recordMinPrice",
            maxPrice: "recordMaxPrice",
            body: "recordRows",
            empty: "recordEmpty",
            count: "recordCount",
            renderRow: (row) => `
                <tr>
                    <td>${row.seenDate || "-"}</td>
                    <td>${row.dealDate}</td>
                    <td>${row.gu}</td>
                    <td>${row.dong}</td>
                    <td class="apt">${row.apt}</td>
                    <td>${Number(row.area).toFixed(2)} m2</td>
                    <td>${row.households ? money(row.households) : "-"}</td>
                    <td>${price(row.previousHighEok)}억</td>
                    <td class="price">${price(row.priceEok)}억</td>
                    <td class="up">▲${price(row.increaseEok)}억</td>
                </tr>
            `,
        });

        setupTable({
            rows: latestRows,
            gu: "latestGu",
            minArea: "latestMinArea",
            maxArea: "latestMaxArea",
            minPrice: "latestMinPrice",
            maxPrice: "latestMaxPrice",
            body: "latestRows",
            empty: "latestEmpty",
            count: "latestCount",
            renderRow: (row) => `
                <tr>
                    <td>${row.seenDate || "-"}</td>
                    <td>${row.dealDate}</td>
                    <td>${row.gu}</td>
                    <td>${row.dong}</td>
                    <td class="apt">${row.apt}</td>
                    <td>${Number(row.area).toFixed(2)} m2</td>
                    <td>${row.floor ?? "-"}</td>
                    <td>${row.households ? money(row.households) : "-"}</td>
                    <td class="price">${price(row.priceEok)}억</td>
                </tr>
            `,
        });

        const buttons = document.querySelectorAll(".view-button");
        const recordsPanel = document.getElementById("recordsPanel");
        const latestPanel = document.getElementById("latestPanel");

        buttons.forEach((button) => {
            button.addEventListener("click", () => {
                const view = button.dataset.view;
                buttons.forEach((item) => item.classList.toggle("active", item === button));
                recordsPanel.hidden = view !== "records";
                latestPanel.hidden = view !== "latest";
            });
        });
    </script>
</body>
</html>
